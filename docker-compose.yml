services:
  # --- PostgreSQL + pgvector ---
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aura
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: ${AURA_DB_PASSWORD:-aura_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- One-shot pipeline (manual runs) ---
  # Usage: docker compose run --rm aura process <audio_file>
  # Does NOT require postgres — works standalone for file-based output.
  # To enable DB persistence, start `db` first: docker compose up -d db
  aura:
    build: .
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - model-cache:/root/.cache
    env_file:
      - .env
    environment:
      - AURA_DATABASE_URL=postgresql://aura:${AURA_DB_PASSWORD:-aura_secret}@db:5432/aura

  # --- File watcher (background service) ---
  watcher:
    build: .
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - model-cache:/root/.cache
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - AURA_DATABASE_URL=postgresql://aura:${AURA_DB_PASSWORD:-aura_secret}@db:5432/aura
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["python", "-m", "src.cli"]
    command: ["watch", "--interval", "60", "--log-file", "/app/logs/watcher.log"]

  # --- Ingest API (receives uploads from ESP32 devices) ---
  ingest:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    ports:
      - "8080:8080"
    entrypoint: ["python", "-m", "src.cli"]
    command: ["serve", "--port", "8080"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  model-cache:
  pgdata:
